# ============================================================
# VoteWise — nginx Configuration
# Author: Tanmay Dalvi
# ============================================================
server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;
    charset      utf-8;

    # ---- Security Headers ----
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' cdnjs.cloudflare.com www.gstatic.com apis.google.com www.googleapis.com firebasestorage.googleapis.com *.firebaseio.com; style-src 'self' fonts.googleapis.com cdnjs.cloudflare.com 'unsafe-inline'; font-src fonts.gstatic.com; connect-src *.googleapis.com *.firebaseio.com translation.googleapis.com generativelanguage.googleapis.com *.cloudfunctions.net; img-src 'self' data:; frame-src 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ---- Caching ----
    location ~* \.(css|js|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    location = /manifest.json {
        expires     1d;
        add_header  Cache-Control "public";
        add_header  Content-Type "application/manifest+json";
    }

    # ---- SPA Fallback ----
    location / {
        try_files   $uri $uri/ /index.html;
        expires     -1;
        add_header  Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        return 404;
    }

    # ---- Block backup/config files ----
    location ~* \.(env|json|lock|log|md|yml|yaml|sh|git)$ {
        deny all;
        return 404;
    }

    # ---- Gzip Compression ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/manifest+json image/svg+xml;

    # ---- Error Pages ----
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ---- Logging ----
    access_log  /var/log/nginx/votewise_access.log  combined;
    error_log   /var/log/nginx/votewise_error.log   warn;
}
