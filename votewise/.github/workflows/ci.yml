# ============================================================
# VoteWise — GitHub Actions CI/CD Pipeline
# Author: Tanmay Dalvi
# Triggers: push/PR to main and develop branches
# ============================================================
name: VoteWise CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npx eslint *.js --ext .js --max-warnings 20

      - name: Check HTML structure
        run: |
          grep -c 'role="tab"' index.html || echo "WARN: tab roles missing"
          grep -c 'aria-label' index.html || echo "WARN: aria-labels missing"
          grep -c 'Content-Security-Policy' index.html || echo "WARN: CSP missing"

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))" && echo "manifest.json OK"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))" && echo "package.json OK"
          node -e "JSON.parse(require('fs').readFileSync('.eslintrc.json','utf8'))" && echo ".eslintrc.json OK"
          node -e "JSON.parse(require('fs').readFileSync('functions/package.json','utf8'))" && echo "functions/package.json OK"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit functions dependencies
        run: |
          cd functions
          npm audit --audit-level=high || true

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AIzaSy" --include="*.js" . || echo "WARN: Possible API key in JS"
          ! grep -rn "-----BEGIN" --include="*.js" . || echo "WARN: Possible private key"
          echo "Secret scan complete"

      - name: Verify CSP header in nginx config
        run: grep -c "Content-Security-Policy" nginx.conf

  test-suite:
    name: Test Suite Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Count test cases
        run: |
          COUNT=$(grep -c "^  it(" tests/votewise.test.js)
          echo "Test cases found: $COUNT"
          [ "$COUNT" -ge 80 ] && echo "PASS: 80+ tests present" || echo "WARN: fewer than 80 tests"

      - name: Validate test file syntax
        run: node --check tests/votewise.test.js && echo "Test file syntax OK"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t votewise:ci .

      - name: Smoke test container
        run: |
          docker run -d --name votewise-ci -p 8080:80 votewise:ci
          sleep 5
          curl -f http://localhost:8080/ | grep -i "VoteWise" && echo "Container serving OK"
          docker stop votewise-ci && docker rm votewise-ci

  file-structure-check:
    name: File Structure Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          for f in index.html styles.css app.js config.js security.js translate.js calendar.js analytics.js manifest.json Dockerfile nginx.conf package.json .eslintrc.json functions/index.js functions/package.json tests/votewise.test.js README.md SECURITY.md CONTRIBUTING.md LICENSE; do
            [ -f "$f" ] && echo "OK: $f" || echo "MISSING: $f"
          done
